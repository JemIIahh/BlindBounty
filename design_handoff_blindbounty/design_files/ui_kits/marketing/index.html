<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BlindBounty — Marketing UI Kit</title>
<link rel="icon" href="../../assets/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#0d0d0d; color:#d4d4d4; font-family:'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace; }
  @keyframes bbFade { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
  @keyframes bbBlink { 50% { opacity: 0; } }
  @keyframes bbPulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
  #app > * { animation: bbFade .3s ease-out; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [page, setPage] = useState('home');
  return (
    <div>
      <Navbar active="browse" onNav={()=>{}} />
      {page === 'home' && (<>
        <Hero onCta={()=>setPage('browse')} />
        <Problem />
        <HowItWorks />
        <Trust />
        <Roles />
      </>)}
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
